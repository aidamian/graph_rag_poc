services:
  neo4j:
    image: neo4j:5.26-community
    container_name: graph-rag-neo4j
    environment:
      NEO4J_AUTH: neo4j/graph-rag-demo
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: graph-rag-api
    environment:
      APP_NAME: Cyber Graph RAG PoC
      API_HOST: 0.0.0.0
      API_PORT: 8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: graph-rag-demo
      NEO4J_DATABASE: neo4j
      AUTO_SEED: "true"
      USE_OPENAI: auto
      OPENAI_MODEL: gpt-5.4-mini
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      - neo4j

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: graph-rag-ui
    environment:
      API_BASE_URL: http://api:8000
      LOG_LEVEL: INFO
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  neo4j_data:

